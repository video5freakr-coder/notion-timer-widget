<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Lern-Timer</title>

  <style>
    :root {
      color-scheme: light dark;
      --bg: rgba(255,255,255,.95);
      --card: rgba(55,53,47,.035);
      --text: #2f2f2f;
      --muted: #787774;
      --border: rgba(55,53,47,.16);
      --button: #2f2f2f;
      --buttonText: #fff;
      --soft: rgba(55,53,47,.08);
      --danger: #d44c47;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: rgba(32,32,32,.96);
        --card: rgba(255,255,255,.035);
        --text: #f2f2f2;
        --muted: #aaa;
        --border: rgba(255,255,255,.14);
        --button: #f2f2f2;
        --buttonText: #222;
        --soft: rgba(255,255,255,.10);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: transparent;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 7px;
      color: var(--text);
    }

    .widget {
      width: min(100%, 500px);
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg);
    }

    .master-row {
      display: flex;
      justify-content: flex-start;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
    }

    .head,
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    h2 {
      margin: 0;
      font-size: 15px;
    }

    .status,
    .note {
      color: var(--muted);
      font-size: 11px;
    }

    .note {
      margin: -2px 0 0;
      text-align: center;
    }

    .display {
      padding: 2px 0;
      text-align: center;
      font-size: clamp(34px, 9vw, 55px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -.045em;
      font-variant-numeric: tabular-nums;
    }

    .fraction {
      margin-left: 3px;
      color: var(--muted);
      font-size: .52em;
    }

    .controls,
    .inputs,
    .adjust-row {
      display: grid;
      gap: 5px;
    }

    .controls {
      grid-template-columns: 1fr 1fr;
    }

    .inputs {
      grid-template-columns: repeat(3, 1fr);
    }

    .adjust-row {
      grid-template-columns: repeat(4, 1fr);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .field label {
      color: var(--muted);
      font-size: 11px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }

    button:active {
      transform: scale(.98);
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .primary {
      color: var(--buttonText);
      background: var(--button);
    }

    .secondary,
    .master,
    .adjust-row button {
      color: var(--text);
      background: var(--soft);
    }

    .master {
      padding: 7px 10px;
      font-size: 11px;
    }

    .adjust-row button {
      padding: 7px 3px;
      font-size: 11px;
    }

    .negative button {
      color: var(--muted);
    }

    input[type="number"] {
      width: 100%;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 9px;
      outline: none;
      color: var(--text);
      background: transparent;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 78px;
      accent-color: var(--text);
    }

    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--text);
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      cursor: pointer;
    }

    .volume {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 11px;
    }

    .alarm-stop {
      display: none;
      grid-column: 1 / -1;
      color: #fff;
      background: var(--danger);
    }

    .finished .timer-display {
      color: var(--danger);
    }

    @media (max-width: 420px) {
      .card {
        padding: 11px;
      }

      .setting-row {
        align-items: flex-start;
        flex-direction: column;
        gap: 5px;
      }
    }
  </style>
</head>

<body>
  <main class="widget">

    <div class="master-row">
      <button class="master master-toggle" type="button">
        ▶ Beide starten
      </button>
    </div>

    <section class="card">

      <div class="head">
        <h2>Stoppuhr</h2>
        <span class="status" id="swStatus">Bereit</span>
      </div>

      <div class="display">
        <span id="swMain">00:00:00</span>
        <span class="fraction" id="swFraction">.00</span>
      </div>

      <div class="controls">
        <button class="primary" id="swToggle" type="button">
          Start
        </button>

        <button class="secondary" id="swReset" type="button">
          Zurücksetzen
        </button>
      </div>

      <div class="setting-row">

        <label class="toggle">
          <input id="alphaEnabled" type="checkbox" checked>
          Alpha-Waves
        </label>

        <span class="volume">
          Leise

          <input
            id="alphaVolume"
            type="range"
            min="0"
            max="0.06"
            step="0.002"
            value="0.016"
          >
        </span>

      </div>

      <p class="note">
        Für den Binaural-Effekt Kopfhörer verwenden.
      </p>

    </section>

    <section class="card" id="timerCard">

      <div class="head">
        <h2>Timer</h2>
        <span class="status" id="timerStatus">Bereit</span>
      </div>

      <div class="inputs">

        <div class="field">
          <label for="hours">Stunden</label>

          <input
            id="hours"
            type="number"
            min="0"
            max="99"
            value="0"
          >
        </div>

        <div class="field">
          <label for="minutes">Minuten</label>

          <input
            id="minutes"
            type="number"
            min="0"
            max="59"
            value="25"
          >
        </div>

        <div class="field">
          <label for="seconds">Sekunden</label>

          <input
            id="seconds"
            type="number"
            min="0"
            max="59"
            value="0"
          >
        </div>

      </div>

      <div class="display timer-display" id="timerDisplay">
        00:25:00
      </div>

      <div class="adjust-row">
        <button data-minutes="1" type="button">+1 min</button>
        <button data-minutes="5" type="button">+5 min</button>
        <button data-minutes="10" type="button">+10 min</button>
        <button data-minutes="30" type="button">+30 min</button>
      </div>

      <div class="adjust-row negative">
        <button data-minutes="-1" type="button">−1 min</button>
        <button data-minutes="-5" type="button">−5 min</button>
        <button data-minutes="-10" type="button">−10 min</button>
        <button data-minutes="-30" type="button">−30 min</button>
      </div>

      <div class="controls">

        <button class="primary" id="timerToggle" type="button">
          Start
        </button>

        <button class="secondary" id="timerReset" type="button">
          Zurücksetzen
        </button>

        <button class="alarm-stop" id="alarmStop" type="button">
          Alarm stoppen
        </button>

      </div>

      <div class="setting-row">

        <label class="toggle">
          <input id="alarmEnabled" type="checkbox" checked>
          Alarmton
        </label>

        <span class="volume">
          Lautstärke

          <input
            id="alarmVolume"
            type="range"
            min="0"
            max="0.35"
            step="0.01"
            value="0.14"
          >
        </span>

      </div>

      <div class="setting-row">

        <label class="toggle">
          <input id="notifyEnabled" type="checkbox">
          Desktop-Benachrichtigung
        </label>

        <span class="status" id="notifyStatus">
          Aus
        </span>

      </div>

    </section>

    <div class="master-row">
      <button class="master master-toggle" type="button">
        ▶ Beide starten
      </button>
    </div>

  </main>

  <script>
    "use strict";

    const $ = id => document.getElementById(id);

    const clamp = (value, min, max) =>
      Math.min(
        Math.max(Number(value) || 0, min),
        max
      );

    const roundMinutes = milliseconds =>
      Math.round(milliseconds / 60000);

    let audioContext;

    function audio() {
      if (!audioContext) {
        audioContext = new (
          window.AudioContext ||
          window.webkitAudioContext
        )();
      }

      if (audioContext.state === "suspended") {
        audioContext.resume();
      }

      return audioContext;
    }

    /*
      STOPPUHR
    */

    let swRunning = false;
    let swStartedAt = 0;
    let swElapsed = 0;
    let swFrame;
    let alphaNodes;

    function formatStopwatch(ms) {
      const csTotal = Math.floor(ms / 10);
      const cs = csTotal % 100;

      const secTotal = Math.floor(csTotal / 100);
      const sec = secTotal % 60;

      const minTotal = Math.floor(secTotal / 60);
      const min = minTotal % 60;

      const hrs = Math.floor(minTotal / 60);

      return {
        main: [hrs, min, sec]
          .map(number =>
            String(number).padStart(2, "0")
          )
          .join(":"),

        fraction:
          String(cs).padStart(2, "0")
      };
    }

    function renderStopwatch() {
      const elapsed = swRunning
        ? swElapsed +
          performance.now() -
          swStartedAt
        : swElapsed;

      const formatted =
        formatStopwatch(elapsed);

      $("swMain").textContent =
        formatted.main;

      $("swFraction").textContent =
        "." + formatted.fraction;

      if (swRunning) {
        swFrame =
          requestAnimationFrame(
            renderStopwatch
          );
      }
    }

    function startAlpha() {
      if (
        alphaNodes ||
        !swRunning ||
        !$("alphaEnabled").checked ||
        Number($("alphaVolume").value) <= 0
      ) {
        return;
      }

      const ctx = audio();

      const master =
        ctx.createGain();

      const left =
        ctx.createOscillator();

      const right =
        ctx.createOscillator();

      const leftPan =
        ctx.createStereoPanner();

      const rightPan =
        ctx.createStereoPanner();

      left.type = "sine";
      right.type = "sine";

      left.frequency.value = 200;
      right.frequency.value = 210;

      leftPan.pan.value = -1;
      rightPan.pan.value = 1;

      master.gain.setValueAtTime(
        0.0001,
        ctx.currentTime
      );

      master.gain.exponentialRampToValueAtTime(
        Math.max(
          0.0001,
          Number($("alphaVolume").value)
        ),
        ctx.currentTime + 0.35
      );

      left
        .connect(leftPan)
        .connect(master);

      right
        .connect(rightPan)
        .connect(master);

      master.connect(ctx.destination);

      left.start();
      right.start();

      alphaNodes = {
        left,
        right,
        master
      };
    }

    function stopAlpha() {
      if (!alphaNodes || !audioContext) {
        return;
      }

      const nodes = alphaNodes;
      alphaNodes = null;

      const now =
        audioContext.currentTime;

      try {
        nodes.master.gain.cancelScheduledValues(
          now
        );

        nodes.master.gain.setValueAtTime(
          Math.max(
            0.0001,
            nodes.master.gain.value
          ),
          now
        );

        nodes.master.gain.exponentialRampToValueAtTime(
          0.0001,
          now + 0.12
        );

        nodes.left.stop(now + 0.14);
        nodes.right.stop(now + 0.14);
      } catch (_) {
      }
    }

    function startStopwatch() {
      if (swRunning) {
        return;
      }

      audio();

      swStartedAt =
        performance.now();

      swRunning = true;

      $("swToggle").textContent =
        "Pause";

      $("swStatus").textContent =
        "Läuft";

      startAlpha();
      renderStopwatch();
    }

    function pauseStopwatch(
      label = "Pausiert"
    ) {
      if (!swRunning) {
        return;
      }

      swElapsed +=
        performance.now() -
        swStartedAt;

      swRunning = false;

      cancelAnimationFrame(swFrame);

      stopAlpha();

      $("swToggle").textContent =
        "Weiter";

      $("swStatus").textContent =
        label;

      renderStopwatch();
    }

    function resetStopwatch() {
      swRunning = false;
      swElapsed = 0;

      cancelAnimationFrame(swFrame);

      stopAlpha();

      $("swToggle").textContent =
        "Start";

      $("swStatus").textContent =
        "Bereit";

      resumeSw = false;

      renderStopwatch();
    }

    /*
      TIMER
    */

    let timerRunning = false;
    let timerEnd = 0;
    let timerInterval;
    let alarmInterval;
    let segmentStartedAt = null;

    let configuredMs =
      inputDuration();

    let remainingMs =
      configuredMs;

    function inputDuration() {
      return (
        clamp(
          $("hours").value,
          0,
          99
        ) * 3600 +

        clamp(
          $("minutes").value,
          0,
          59
        ) * 60 +

        clamp(
          $("seconds").value,
          0,
          59
        )
      ) * 1000;
    }

    function writeInputs(ms) {
      const totalSeconds =
        Math.floor(
          Math.max(0, ms) / 1000
        );

      $("hours").value =
        Math.floor(
          totalSeconds / 3600
        );

      $("minutes").value =
        Math.floor(
          totalSeconds / 60
        ) % 60;

      $("seconds").value =
        totalSeconds % 60;
    }

    function formatTimer(ms) {
      const totalSeconds =
        Math.max(
          0,
          Math.ceil(ms / 1000)
        );

      const hours =
        Math.floor(
          totalSeconds / 3600
        );

      const minutes =
        Math.floor(
          totalSeconds / 60
        ) % 60;

      const seconds =
        totalSeconds % 60;

      return [
        hours,
        minutes,
        seconds
      ]
        .map(number =>
          String(number).padStart(2, "0")
        )
        .join(":");
    }

    function renderTimer() {
      $("timerDisplay").textContent =
        formatTimer(remainingMs);
    }

    function playAlarm() {
      if (
        !$("alarmEnabled").checked ||
        Number($("alarmVolume").value) <= 0
      ) {
        return;
      }

      const ctx = audio();
      const now = ctx.currentTime;

      [0, 0.18, 0.36].forEach(
        (delay, index) => {
          const oscillator =
            ctx.createOscillator();

          const gain =
            ctx.createGain();

          oscillator.type =
            index === 1
              ? "square"
              : "sine";

          oscillator.frequency.value =
            index === 1
              ? 880
              : 660;

          gain.gain.setValueAtTime(
            Number(
              $("alarmVolume").value
            ),
            now + delay
          );

          gain.gain.exponentialRampToValueAtTime(
            0.0001,
            now + delay + 0.13
          );

          oscillator
            .connect(gain)
            .connect(ctx.destination);

          oscillator.start(
            now + delay
          );

          oscillator.stop(
            now + delay + 0.14
          );
        }
      );
    }

    function startAlarm() {
      stopAlarm();

      $("timerCard").classList.add(
        "finished"
      );

      $("alarmStop").style.display =
        "block";

      playAlarm();

      alarmInterval =
        setInterval(
          playAlarm,
          1100
        );
    }

    function stopAlarm() {
      clearInterval(alarmInterval);

      alarmInterval = null;

      $("timerCard").classList.remove(
        "finished"
      );

      $("alarmStop").style.display =
        "none";
    }

    /*
      DESKTOP-BENACHRICHTIGUNG
    */

    function updateNotifyStatus() {
      if (!("Notification" in window)) {
        $("notifyStatus").textContent =
          "Nicht unterstützt";

        $("notifyEnabled").checked =
          false;
      }

      else if (
        Notification.permission ===
          "granted" &&
        $("notifyEnabled").checked
      ) {
        $("notifyStatus").textContent =
          "An";
      }

      else if (
        Notification.permission ===
        "denied"
      ) {
        $("notifyStatus").textContent =
          "Blockiert";

        $("notifyEnabled").checked =
          false;
      }

      else {
        $("notifyStatus").textContent =
          "Aus";
      }
    }

    async function changeNotificationSetting() {
      if (
        !$("notifyEnabled").checked
      ) {
        localStorage.setItem(
          "timerNotify",
          "false"
        );

        updateNotifyStatus();
        return;
      }

      if (!("Notification" in window)) {
        updateNotifyStatus();
        return;
      }

      try {
        const permission =
          Notification.permission ===
          "default"
            ? await Notification
                .requestPermission()
            : Notification.permission;

        const enabled =
          permission === "granted";

        $("notifyEnabled").checked =
          enabled;

        localStorage.setItem(
          "timerNotify",
          String(enabled)
        );
      }

      catch (_) {
        $("notifyEnabled").checked =
          false;

        localStorage.setItem(
          "timerNotify",
          "false"
        );

        $("notifyStatus").textContent =
          "In Notion blockiert";

        return;
      }

      updateNotifyStatus();
    }

    function sendNotification(
      segmentMs
    ) {
      if (
        !$("notifyEnabled").checked ||
        !("Notification" in window) ||
        Notification.permission !==
          "granted"
      ) {
        return;
      }

      const configuredMinutes =
        roundMinutes(configuredMs);

      const segmentMinutes =
        roundMinutes(segmentMs);

      try {
        new Notification(
          `${configuredMinutes}/${segmentMinutes} Minuten Timer abgelaufen`,
          {
            body:
              "Dein Lern-Timer ist beendet.",

            tag:
              "notion-study-timer",

            renotify:
              true
          }
        );
      }

      catch (_) {
      }
    }

    function startTimer() {
      if (timerRunning) {
        return;
      }

      stopAlarm();
      audio();

      if (remainingMs <= 0) {
        remainingMs =
          configuredMs;
      }

      if (remainingMs <= 0) {
        $("timerStatus").textContent =
          "Zeit einstellen";

        return;
      }

      segmentStartedAt =
        Date.now();

      timerEnd =
        segmentStartedAt +
        remainingMs;

      timerRunning = true;

      $("timerToggle").textContent =
        "Pause";

      $("timerStatus").textContent =
        "Läuft";

      timerInterval =
        setInterval(
          tickTimer,
          100
        );

      tickTimer();
    }

    function pauseTimer(
      label = "Pausiert"
    ) {
      if (!timerRunning) {
        return;
      }

      remainingMs =
        Math.max(
          0,
          timerEnd - Date.now()
        );

      timerRunning = false;
      segmentStartedAt = null;

      clearInterval(timerInterval);

      timerInterval = null;

      $("timerToggle").textContent =
        "Weiter";

      $("timerStatus").textContent =
        label;

      renderTimer();
    }

    function tickTimer() {
      remainingMs =
        Math.max(
          0,
          timerEnd - Date.now()
        );

      renderTimer();

      if (remainingMs <= 0) {
        finishTimer();
      }
    }

    function finishTimer() {
      const segmentMs =
        segmentStartedAt
          ? Math.max(
              0,
              Date.now() -
              segmentStartedAt
            )
          : 0;

      timerRunning = false;
      segmentStartedAt = null;
      remainingMs = 0;

      clearInterval(timerInterval);

      timerInterval = null;
      resumeTimer = false;

      $("timerToggle").textContent =
        "Start";

      $("timerStatus").textContent =
        "Fertig";

      renderTimer();
      startAlarm();

      sendNotification(segmentMs);

      updateMaster();
    }

    function resetTimer() {
      timerRunning = false;
      segmentStartedAt = null;

      clearInterval(timerInterval);

      timerInterval = null;

      stopAlarm();

      remainingMs =
        configuredMs;

      resumeTimer = false;

      $("timerToggle").textContent =
        "Start";

      $("timerStatus").textContent =
        remainingMs > 0
          ? "Bereit"
          : "Zeit einstellen";

      renderTimer();
    }

    function syncInputs() {
      if (timerRunning) {
        return;
      }

      stopAlarm();

      configuredMs =
        inputDuration();

      remainingMs =
        configuredMs;

      $("timerStatus").textContent =
        remainingMs > 0
          ? "Bereit"
          : "Zeit einstellen";

      renderTimer();
      updateMaster();
    }

    function adjustTimer(minutes) {
      stopAlarm();

      const delta =
        Number(minutes) * 60000;

      configuredMs =
        Math.max(
          0,
          configuredMs + delta
        );

      remainingMs =
        Math.max(
          0,
          remainingMs + delta
        );

      writeInputs(configuredMs);

      if (timerRunning) {
        if (remainingMs <= 0) {
          finishTimer();
          return;
        }

        timerEnd =
          Date.now() +
          remainingMs;

        $("timerStatus").textContent =
          "Läuft";
      }

      else {
        $("timerStatus").textContent =
          remainingMs > 0
            ? (
                masterPaused
                  ? "Gemeinsam pausiert"
                  : "Bereit"
              )
            : "Zeit einstellen";
      }

      renderTimer();
      updateMaster();
    }

    /*
      GEMEINSAME STEUERUNG
    */

    const masterButtons = [
      ...document.querySelectorAll(
        ".master-toggle"
      )
    ];

    let masterPaused = false;
    let resumeSw = false;
    let resumeTimer = false;

    function updateMaster() {
      const label =
        masterPaused

          ? "▶ Beide fortsetzen"

          : (
              swRunning ||
              timerRunning

                ? "⏸ Beide pausieren"

                : "▶ Beide starten"
            );

      masterButtons.forEach(
        button =>
          button.textContent = label
      );

      $("swToggle").disabled =
        masterPaused;

      $("timerToggle").disabled =
        masterPaused;
    }

    function startBoth() {
      if (!swRunning) {
        startStopwatch();
      }

      if (!timerRunning) {
        startTimer();
      }

      updateMaster();
    }

    function pauseBoth() {
      resumeSw =
        swRunning;

      resumeTimer =
        timerRunning;

      if (swRunning) {
        pauseStopwatch(
          "Gemeinsam pausiert"
        );
      }

      if (timerRunning) {
        pauseTimer(
          "Gemeinsam pausiert"
        );
      }

      stopAlarm();

      masterPaused = true;

      updateMaster();
    }

    function resumeBoth() {
      masterPaused = false;

      const startSwAgain =
        resumeSw;

      const startTimerAgain =
        resumeTimer;

      resumeSw = false;
      resumeTimer = false;

      if (startSwAgain) {
        startStopwatch();
      }

      if (
        startTimerAgain &&
        remainingMs > 0
      ) {
        startTimer();
      }

      updateMaster();
    }

    function toggleMaster() {
      audio();

      if (masterPaused) {
        resumeBoth();
      }

      else if (
        swRunning ||
        timerRunning
      ) {
        pauseBoth();
      }

      else {
        startBoth();
      }
    }

    /*
      BUTTONS UND EINGABEN
    */

    $("swToggle").addEventListener(
      "click",
      () => {
        if (masterPaused) {
          return;
        }

        if (swRunning) {
          pauseStopwatch();
        } else {
          startStopwatch();
        }

        updateMaster();
      }
    );

    $("swReset").addEventListener(
      "click",
      () => {
        resetStopwatch();
        updateMaster();
      }
    );

    $("alphaEnabled").addEventListener(
      "change",
      () => {
        if (
          swRunning &&
          $("alphaEnabled").checked
        ) {
          startAlpha();
        } else {
          stopAlpha();
        }
      }
    );

    $("alphaVolume").addEventListener(
      "input",
      () => {
        if (
          alphaNodes &&
          audioContext
        ) {
          const value =
            Number(
              $("alphaVolume").value
            );

          if (value <= 0) {
            stopAlpha();
          } else {
            alphaNodes.master.gain
              .setTargetAtTime(
                value,
                audioContext.currentTime,
                0.05
              );
          }
        }

        else if (swRunning) {
          startAlpha();
        }
      }
    );

    [
      $("hours"),
      $("minutes"),
      $("seconds")
    ].forEach(
      input =>
        input.addEventListener(
          "input",
          syncInputs
        )
    );

    document
      .querySelectorAll(
        "[data-minutes]"
      )
      .forEach(
        button =>
          button.addEventListener(
            "click",
            () =>
              adjustTimer(
                button.dataset.minutes
              )
          )
      );

    $("timerToggle").addEventListener(
      "click",
      () => {
        if (masterPaused) {
          return;
        }

        if (timerRunning) {
          pauseTimer();
        } else {
          startTimer();
        }

        updateMaster();
      }
    );

    $("timerReset").addEventListener(
      "click",
      () => {
        resetTimer();
        updateMaster();
      }
    );

    $("alarmStop").addEventListener(
      "click",
      stopAlarm
    );

    $("notifyEnabled").addEventListener(
      "change",
      changeNotificationSetting
    );

    masterButtons.forEach(
      button =>
        button.addEventListener(
          "click",
          toggleMaster
        )
    );

    /*
      STARTZUSTAND
    */

    const savedNotify =
      localStorage.getItem(
        "timerNotify"
      ) === "true";

    $("notifyEnabled").checked =
      savedNotify &&
      "Notification" in window &&
      Notification.permission ===
        "granted";

    updateNotifyStatus();
    renderStopwatch();
    renderTimer();
    updateMaster();
  </script>
</body>
</html>
